services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m customer_support_agent.main
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      KNOWLEDGE_BASE_PATH: /app/knowledge_base
      SQLITE_DB_PATH: /app/storage/db/app.db
      VECTOR_STORE_PATH: /app/storage/vector_store
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./knowledge_base:/app/knowledge_base:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: http://api:8000
      KNOWLEDGE_BASE_PATH: /app/knowledge_base
      SQLITE_DB_PATH: /app/storage/db/app.db
      VECTOR_STORE_PATH: /app/storage/vector_store
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - ./storage:/app/storage
      - ./knowledge_base:/app/knowledge_base:ro
